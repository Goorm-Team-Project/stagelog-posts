apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stagelog-posts-env
  namespace: stagelog
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: ClusterSecretStore
  target:
    name: stagelog-posts-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        .env: |
          SECRET_KEY={{ .SECRET_KEY }}
          DEBUG={{ .DEBUG }}
          ALLOWED_HOSTS={{ .ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS={{ .CORS_ALLOWED_ORIGINS }}
          DB_MODE={{ .DB_MODE }}
          DB_HOST={{ .DB_HOST }}
          DB_NAME_POSTS={{ .DB_NAME_POSTS }}
          DB_USER_POSTS={{ .DB_USER_POSTS }}
          DB_PASSWORD_POSTS={{ .DB_PASSWORD_POSTS }}
          DB_USE_SSL={{ .DB_USE_SSL }}
          DB_SSL_CA={{ .DB_SSL_CA }}
          USE_INTERNAL_SERVICE_API={{ .USE_INTERNAL_SERVICE_API }}
          AUTH_INTERNAL_BASE_URL={{ .AUTH_INTERNAL_BASE_URL }}
          EVENTS_INTERNAL_BASE_URL={{ .EVENTS_INTERNAL_BASE_URL }}
          POSTS_INTERNAL_BASE_URL={{ .POSTS_INTERNAL_BASE_URL }}
          GATEWAY_USER_ID_HEADER={{ .GATEWAY_USER_ID_HEADER }}
          AWS_REGION={{ .AWS_REGION }}
          S3_UPLOAD_BUCKET={{ .S3_UPLOAD_BUCKET }}
          S3_UPLOAD_PREFIX={{ .S3_UPLOAD_PREFIX }}
          S3_PRESIGN_EXPIRES={{ .S3_PRESIGN_EXPIRES }}
          S3_PUBLIC_BASE_URL={{ .S3_PUBLIC_BASE_URL }}
          NOTIFICATION_EVENT_BUS_NAME={{ .NOTIFICATION_EVENT_BUS_NAME }}
          REDIS_HOST={{ .REDIS_HOST }}
          REDIS_PORT={{ .REDIS_PORT }}
          REDIS_DB={{ .REDIS_DB }}
          REDIS_PASSWORD={{ .REDIS_PASSWORD }}
          REDIS_SSL={{ .REDIS_SSL }}
          AUTO_BAN_ENABLED={{ .AUTO_BAN_ENABLED }}
          AUTO_BAN_LIMIT_WINDOW_SECONDS={{ .AUTO_BAN_LIMIT_WINDOW_SECONDS }}
          AUTO_BAN_MAX_REQUESTS={{ .AUTO_BAN_MAX_REQUESTS }}
          AUTO_BAN_BLOCK_TIME_SECONDS={{ .AUTO_BAN_BLOCK_TIME_SECONDS }}
  data:
  - secretKey: SECRET_KEY
    remoteRef:
      key: /stagelog/dev/shared/SECRET_KEY
  - secretKey: DEBUG
    remoteRef:
      key: /stagelog/dev/shared/DEBUG
  - secretKey: ALLOWED_HOSTS
    remoteRef:
      key: /stagelog/dev/shared/ALLOWED_HOSTS
  - secretKey: CORS_ALLOWED_ORIGINS
    remoteRef:
      key: /stagelog/dev/shared/CORS_ALLOWED_ORIGINS
  - secretKey: DB_MODE
    remoteRef:
      key: /stagelog/dev/shared/DB_MODE
  - secretKey: DB_HOST
    remoteRef:
      key: /stagelog/dev/shared/DB_HOST
  - secretKey: DB_NAME_POSTS
    remoteRef:
      key: /stagelog/dev/posts/DB_NAME_POSTS
  - secretKey: DB_USER_POSTS
    remoteRef:
      key: /stagelog/dev/posts/DB_USER_POSTS
  - secretKey: DB_PASSWORD_POSTS
    remoteRef:
      key: /stagelog/dev/posts/DB_PASSWORD_POSTS
  - secretKey: DB_USE_SSL
    remoteRef:
      key: /stagelog/dev/shared/DB_USE_SSL
  - secretKey: DB_SSL_CA
    remoteRef:
      key: /stagelog/dev/shared/DB_SSL_CA
  - secretKey: USE_INTERNAL_SERVICE_API
    remoteRef:
      key: /stagelog/dev/posts/USE_INTERNAL_SERVICE_API
  - secretKey: AUTH_INTERNAL_BASE_URL
    remoteRef:
      key: /stagelog/dev/shared/AUTH_INTERNAL_BASE_URL
  - secretKey: EVENTS_INTERNAL_BASE_URL
    remoteRef:
      key: /stagelog/dev/shared/EVENTS_INTERNAL_BASE_URL
  - secretKey: POSTS_INTERNAL_BASE_URL
    remoteRef:
      key: /stagelog/dev/shared/POSTS_INTERNAL_BASE_URL
  - secretKey: GATEWAY_USER_ID_HEADER
    remoteRef:
      key: /stagelog/dev/shared/GATEWAY_USER_ID_HEADER
  - secretKey: AWS_REGION
    remoteRef:
      key: /stagelog/dev/shared/AWS_REGION
  - secretKey: S3_UPLOAD_BUCKET
    remoteRef:
      key: /stagelog/dev/shared/S3_UPLOAD_BUCKET
  - secretKey: S3_UPLOAD_PREFIX
    remoteRef:
      key: /stagelog/dev/shared/S3_UPLOAD_PREFIX
  - secretKey: S3_PRESIGN_EXPIRES
    remoteRef:
      key: /stagelog/dev/shared/S3_PRESIGN_EXPIRES
  - secretKey: S3_PUBLIC_BASE_URL
    remoteRef:
      key: /stagelog/dev/shared/S3_PUBLIC_BASE_URL
  - secretKey: NOTIFICATION_EVENT_BUS_NAME
    remoteRef:
      key: /stagelog/dev/shared/NOTIFICATION_EVENT_BUS_NAME
  - secretKey: REDIS_HOST
    remoteRef:
      key: /stagelog/dev/shared/REDIS_HOST
  - secretKey: REDIS_PORT
    remoteRef:
      key: /stagelog/dev/shared/REDIS_PORT
  - secretKey: REDIS_DB
    remoteRef:
      key: /stagelog/dev/shared/REDIS_DB
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: /stagelog/dev/shared/REDIS_PASSWORD
  - secretKey: REDIS_SSL
    remoteRef:
      key: /stagelog/dev/shared/REDIS_SSL
  - secretKey: AUTO_BAN_ENABLED
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_ENABLED
  - secretKey: AUTO_BAN_LIMIT_WINDOW_SECONDS
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_LIMIT_WINDOW_SECONDS
  - secretKey: AUTO_BAN_MAX_REQUESTS
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_MAX_REQUESTS
  - secretKey: AUTO_BAN_BLOCK_TIME_SECONDS
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_BLOCK_TIME_SECONDS
