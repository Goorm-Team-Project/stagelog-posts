apiVersion: apps/v1
kind: Deployment
metadata:
  name: posts-svc
  namespace: stagelog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posts-svc
  template:
    metadata:
      labels:
        app: posts-svc
    spec:
      serviceAccountName: stagelog-posts-sa
      containers:
      - name: posts-svc
        image: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-posts:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: stagelog-posts-env
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: config.settings
        ports:
        - containerPort: 8000
